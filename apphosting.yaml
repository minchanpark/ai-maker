# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  - variable: CLAUDE_API_KEY
    secret: CLAUDE_API_KEY
    availability:
      - RUNTIME
  - variable: CLAUDE_MODEL
    value: claude-haiku-4-5-20251001
    availability:
      - BUILD
      - RUNTIME
  - variable: CLAUDE_GENERATE_TIMEOUT_MS
    value: "45000"
    availability:
      - BUILD
      - RUNTIME
  - variable: CLAUDE_CHAT_MODEL
    value: claude-sonnet-4-5
    availability:
      - BUILD
      - RUNTIME
  - variable: CLAUDE_CHAT_MAX_TOKENS
    value: "16384"
    availability:
      - BUILD
      - RUNTIME
  - variable: CLAUDE_CHAT_MAX_RESPONSE_CHARS
    value: "1000000"
    availability:
      - BUILD
      - RUNTIME
  - variable: CLAUDE_CHAT_STREAM_TOTAL_TIMEOUT_MS
    value: "180000"
    availability:
      - BUILD
      - RUNTIME
  - variable: CLAUDE_CHAT_STREAM_IDLE_TIMEOUT_MS
    value: "30000"
    availability:
      - BUILD
      - RUNTIME
  - variable: CLAUDE_CHAT_RECOVERY_TIMEOUT_MS
    value: "45000"
    availability:
      - BUILD
      - RUNTIME
  - variable: ORIGIN_CHECK_STRICT
    value: "true"
    availability:
      - BUILD
      - RUNTIME
  - variable: APP_ORIGIN
    value: https://ai-maker-web--ai-maker-e5925.us-central1.hosted.app
    availability:
      - BUILD
      - RUNTIME
  - variable: RATE_LIMIT_WINDOW_MS
    value: "60000"
    availability:
      - BUILD
      - RUNTIME
  - variable: CHAT_RATE_LIMIT_MAX
    value: "45"
    availability:
      - BUILD
      - RUNTIME
  - variable: GENERATE_RATE_LIMIT_MAX
    value: "20"
    availability:
      - BUILD
      - RUNTIME
  - variable: CHAT_CONTEXT_POLICY
    value: quality_guard_v1
    availability:
      - BUILD
      - RUNTIME
  - variable: CHAT_CONTEXT_TOTAL_BUDGET_CHARS
    value: "180000"
    availability:
      - BUILD
      - RUNTIME
  - variable: CHAT_CONTEXT_FILE_BUDGET_CHARS
    value: "110000"
    availability:
      - BUILD
      - RUNTIME
  - variable: CHAT_CONTEXT_HISTORY_BUDGET_CHARS
    value: "60000"
    availability:
      - BUILD
      - RUNTIME
  - variable: CHAT_CONTEXT_MAX_MESSAGE_CHARS
    value: "12000"
    availability:
      - BUILD
      - RUNTIME
  - variable: CHAT_CONTEXT_MAX_HISTORY_TURNS
    value: "100"
    availability:
      - BUILD
      - RUNTIME
  - variable: CHAT_CONTEXT_MAX_HISTORY_TURN_CHARS
    value: "4000"
    availability:
      - BUILD
      - RUNTIME
  - variable: CHAT_CONTEXT_PINNED_HISTORY_TURNS
    value: "16"
    availability:
      - BUILD
      - RUNTIME
